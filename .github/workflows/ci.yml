name: KariDNS CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test on FreeBSD VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Smoke Test inside FreeBSD VM
        uses: vmactions/freebsd-vm@v1.4.8
        with:
          release: '15.0'
          run: |
            set -e

            echo "::group::📦 [Build] Build KariDNS and Tools"
            make all
            echo "::endgroup::"

            echo "::group::🛡️ [Security Test] Run ASan Boundary Tests"
            make asan_test
            echo "::endgroup::"

            echo "::group::📦 [Build] Build Fuzzers"
            make fuzz fuzz_core fuzz_zone fuzz_conf
            echo "::endgroup::"

            echo "::group::🔍 [Smoke Test] Test dag client against Google DNS"
            echo "Testing UDP query..."
            ./dag www.google.com A @8.8.8.8
            
            echo "Testing TCP query..."
            ./dag google.com TXT @8.8.8.8 +tcp
            echo "::endgroup::"

            echo "::group::🔍 [Smoke Test] Run Fuzzers (60 seconds each)"
            echo "Running fuzz_dns_wire for 60 seconds..."
            ./tests/fuzz/fuzz_dns_wire -max_total_time=60

            echo "Running fuzz_dns_server_core for 60 seconds..."
            ./tests/fuzz/fuzz_dns_server_core -max_total_time=60

            echo "Running fuzz_zone_parser for 60 seconds..."
            ./tests/fuzz/fuzz_zone_parser tests/fuzz/corpus/ -max_total_time=60

            echo "Running fuzz_conf_parser for 60 seconds..."
            ./tests/fuzz/fuzz_conf_parser tests/fuzz/corpus/ -max_total_time=60
            echo "::endgroup::"

            echo ""
            echo "🎉 All builds and smoke tests passed!"
